<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✅ Todo List</h1>
            <p>Organize your tasks efficiently</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="task-input" placeholder="Add a new task..." />
                <button id="add-btn">Add Task</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div id="tasks-container" class="tasks-container"></div>

            <div id="empty-state" class="empty-state">
                <p>📝 No tasks yet. Add one to get started!</p>
            </div>

            <div class="stats">
                <span>Total: <strong id="total-count">0</strong></span>
                <span>Completed: <strong id="completed-count">0</strong></span>
            </div>

            <button id="clear-btn" class="clear-btn">Clear Completed</button>
        </main>

        <footer>
            <p><a href="../../index.html">← Back to Portfolio</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
