<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Rock Paper Scissors</h1>
            <p>Test your luck against the computer</p>
        </header>

        <main>
            <div class="score-board">
                <div class="score">
                    <span class="label">You</span>
                    <span class="value" id="player-score">0</span>
                </div>
                <div class="score">
                    <span class="label">Computer</span>
                    <span class="value" id="computer-score">0</span>
                </div>
            </div>

            <div class="result-display">
                <p id="result-text">Make your choice!</p>
            </div>

            <div class="choices">
                <button class="choice-btn" data-choice="rock">🪨 Rock</button>
                <button class="choice-btn" data-choice="paper">📄 Paper</button>
                <button class="choice-btn" data-choice="scissors">✂️ Scissors</button>
            </div>

            <div class="game-info">
                <p>Your choice: <span id="player-choice">-</span></p>
                <p>Computer choice: <span id="computer-choice">-</span></p>
            </div>

            <button id="reset-btn" class="reset-btn">Reset Game</button>
        </main>

        <footer>
            <p><a href="../../index.html">← Back to Portfolio</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
