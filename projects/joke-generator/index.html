<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>😂 Random Joke Generator</h1>
            <p>Get a laugh with random jokes from the web!</p>
        </header>

        <main>
            <div class="joke-box">
                <div id="joke-content" class="joke-content">
                    <p>Click the button below to get a joke!</p>
                </div>
                <div id="joke-type" class="joke-type"></div>
            </div>

            <div class="button-group">
                <button id="get-joke-btn" class="btn btn-primary">Get a Joke</button>
                <button id="copy-btn" class="btn btn-secondary">Copy Joke</button>
            </div>

            <div id="loading" class="loading hidden">
                <span class="spinner"></span>
                <p>Loading joke...</p>
            </div>

            <div id="error" class="error hidden"></div>

            <div id="success" class="success hidden">
                Joke copied to clipboard! 📋
            </div>
        </main>

        <footer>
            <p>Powered by <a href="https://official-joke-api.appspot.com/" target="_blank">Official Joke API</a></p>
            <p><a href="../../index.html">← Back to Portfolio</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
